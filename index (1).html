<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Kata Nama Am Tahun 1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
</head>
<body>
    <div class="game-container">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <h1 id="level-title">Aras 1</h1>
        <p id="instructionText">Sila tunggu...</p>
        
        <div id="sentence-container" class="sentence"></div>
        
        <div class="stats">
            <div>⭐ Skor: <b id="score">0</b></div>
            <div>🏆 Terbaik: <b id="high-score">0</b></div>
            <div>❤️ Nyawa: <b id="lives">5</b></div>
        </div>
        
        <button id="next-btn" onclick="nextLevel()" style="display:none;">Seterusnya ➡️</button>
    </div>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Offline Mode Ready"));
        }
    </script>
</body>
</html>
